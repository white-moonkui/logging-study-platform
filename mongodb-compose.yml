# 测井培训系统 - MongoDB 独立部署配置
# 用途：仅启动 MongoDB 数据库服务

version: '3.8'

services:
    # MongoDB 数据库
    mongodb:
        image: mongo:7.0
        container_name: well-logging-mongodb
        ports:
            - '27017:27017'
        environment:
            - MONGO_INITDB_DATABASE=well_logging_training
        volumes:
            - mongo-data:/data/db
            - mongo-init:/docker-entrypoint-initdb.d
        networks:
            - app-network
        restart: unless-stopped
        healthcheck:
            test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 40s

    # MongoDB Express Web UI（可选）
    mongo-express:
        image: mongo-express:1.0.2
        container_name: well-logging-mongo-express
        ports:
            - '8081:8081'
        environment:
            - ME_CONFIG_MONGODB_URL=mongodb://mongodb:27017
            - ME_CONFIG_BASICAUTH_USERNAME=admin
            - ME_CONFIG_BASICAUTH_PASSWORD=admin123
        depends_on:
            - mongodb
        networks:
            - app-network
        restart: unless-stopped

networks:
    app-network:
        driver: bridge

volumes:
    mongo-data:
        driver: local
    mongo-init:
        driver: local
