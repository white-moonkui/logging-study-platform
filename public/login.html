<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>登录 - 测井专业智能培训系统</title>
        <link rel="stylesheet" href="styles.css" />
        <link
            href="/vendor/bootstrap-icons/bootstrap-icons.css"
            rel="stylesheet"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ========== Login page specific styles — uses design tokens from styles.css ========== */
            body {
                font-family: var(--font-sans);
                background: var(--bg-gradient);
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 20px;
                margin: 0;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .login-wrapper {
                width: 100%;
                max-width: 420px;
            }

            .card {
                background: var(--glass-bg);
                backdrop-filter: var(--glass-blur);
                -webkit-backdrop-filter: var(--glass-blur);
                border: 1px solid var(--glass-border);
                border-radius: var(--radius-xl);
                box-shadow: var(--glass-shadow);
                padding: 40px 36px 32px;
                animation: scaleIn 0.3s ease forwards;
            }

            .logo {
                text-align: center;
                margin-bottom: 32px;
            }

            .logo .logo-icon {
                width: 64px;
                height: 64px;
                background: var(--gradient-primary);
                border-radius: var(--radius-lg);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                color: var(--text-white);
                font-size: 32px;
                margin-bottom: 16px;
                box-shadow: 0 8px 24px rgba(14, 165, 233, 0.3);
            }

            .logo h1 {
                font-size: 22px;
                font-weight: 700;
                color: var(--text-primary);
                letter-spacing: -0.3px;
                margin: 0 0 4px 0;
            }

            .logo p {
                font-size: 13px;
                color: var(--text-secondary);
                margin: 0;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group label {
                display: block;
                font-size: 13px;
                font-weight: 500;
                color: var(--text-secondary);
                margin-bottom: 6px;
            }

            .form-group .input-wrapper {
                position: relative;
            }

            .form-group .input-wrapper > i {
                position: absolute;
                left: 14px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-muted);
                font-size: 16px;
                pointer-events: none;
                z-index: 1;
            }

            .form-group input {
                width: 100%;
                padding: 12px 14px 12px 42px;
                font-size: 14px;
                font-family: var(--font-sans);
                color: var(--text-primary);
                background: var(--bg-primary);
                border: 2px solid var(--border-color);
                border-radius: var(--radius-md);
                outline: none;
                transition: all var(--transition-fast);
                -webkit-appearance: none;
                appearance: none;
                box-sizing: border-box;
            }

            .form-group input::placeholder {
                color: var(--text-muted);
            }

            .form-group input:focus {
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
            }

            .role-tabs {
                display: flex;
                gap: 4px;
                background: var(--bg-tertiary);
                padding: 4px;
                border-radius: var(--radius-md);
                margin-bottom: 24px;
            }

            .role-tab {
                flex: 1;
                padding: 8px 12px;
                font-size: 13px;
                font-weight: 500;
                color: var(--text-secondary);
                background: transparent;
                border: none;
                border-radius: var(--radius-sm);
                cursor: pointer;
                transition: all var(--transition-fast);
                text-align: center;
                font-family: var(--font-sans);
            }

            .role-tab:hover {
                color: var(--text-primary);
            }

            .role-tab.active {
                background: var(--glass-bg);
                color: var(--primary);
                box-shadow: var(--shadow-sm);
            }

            .role-tab i {
                margin-right: 4px;
            }

            .form-check {
                display: flex;
                align-items: center;
                gap: 8px;
                margin-bottom: 20px;
            }

            .form-check input[type='checkbox'] {
                width: 18px;
                height: 18px;
                accent-color: var(--primary);
                cursor: pointer;
                margin: 0;
            }

            .form-check label {
                font-size: 13px;
                color: var(--text-secondary);
                cursor: pointer;
                user-select: none;
            }

            .btn-block {
                width: 100%;
            }

            .alert {
                display: none;
                align-items: center;
                gap: 8px;
                padding: 12px 16px;
                border-radius: var(--radius-sm);
                margin-bottom: 16px;
                font-size: 13px;
                animation: slideDown 0.3s ease;
            }

            .alert.show {
                display: block;
            }

            .alert-danger {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.2);
                color: var(--danger);
            }

            .alert-success {
                background: rgba(16, 185, 129, 0.1);
                border: 1px solid rgba(16, 185, 129, 0.2);
                color: var(--success);
            }

            @keyframes slideDown {
                from {
                    opacity: 0;
                    transform: translateY(-20px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .loading {
                display: none;
                width: 20px;
                height: 20px;
                border: 3px solid rgba(255, 255, 255, 0.3);
                border-radius: 50%;
                border-top-color: var(--text-white);
                animation: spin 1s ease-in-out infinite;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .guest-entry {
                margin-top: 20px;
                padding-top: 20px;
                border-top: 1px solid var(--border-color);
                text-align: center;
            }
            .guest-entry .btn-guest {
                width: 100%;
                padding: 10px 16px;
                font-size: 14px;
                font-family: var(--font-sans);
                font-weight: 600;
                color: var(--primary);
                background: transparent;
                border: 2px dashed var(--primary);
                border-radius: var(--radius-md);
                cursor: pointer;
                transition: all var(--transition-fast);
            }
            .guest-entry .btn-guest:hover {
                background: rgba(14, 165, 233, 0.06);
                border-style: solid;
            }
            .guest-entry .btn-guest i {
                margin-right: 6px;
            }
            .guest-hint {
                font-size: 12px;
                color: var(--text-muted);
                margin-top: 8px;
            }

            .demo-accounts {
                margin-top: 24px;
                padding-top: 20px;
                border-top: 1px solid var(--border-color);
            }

            .demo-accounts-label {
                font-size: 12px;
                font-weight: 600;
                color: var(--text-muted);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 12px;
            }

            .demo-account-row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 8px 0;
            }

            .demo-account-row:not(:last-child) {
                border-bottom: 1px solid var(--border-color);
            }

            .demo-role-name {
                font-size: 13px;
                font-weight: 500;
                color: var(--text-primary);
            }

            .demo-btn {
                font-size: 12px;
                padding: 4px 12px;
                border-radius: var(--radius-sm);
                border: 1px solid var(--border-color);
                background: var(--bg-primary);
                color: var(--text-secondary);
                cursor: pointer;
                font-family: 'Courier New', monospace;
                transition: all var(--transition-fast);
            }

            .demo-btn:hover {
                border-color: var(--primary);
                color: var(--primary);
                background: rgba(14, 165, 233, 0.05);
            }

            .login-footer {
                text-align: center;
                margin-top: 24px;
                font-size: 12px;
                color: var(--text-muted);
            }

            @media (max-width: 480px) {
                .card {
                    padding: 28px 20px 24px;
                }

                .logo .logo-icon {
                    width: 52px;
                    height: 52px;
                    font-size: 26px;
                }

                .logo h1 {
                    font-size: 18px;
                }

                .role-tab {
                    font-size: 12px;
                    padding: 6px 8px;
                }
            }
        </style>
    </head>
    <body>
        <div class="login-wrapper">
            <!-- Login Card -->
            <div class="card">
                <!-- Brand / Logo -->
                <div class="logo">
                    <div class="logo-icon">
                        <i class="bi bi-gear-fill"></i>
                    </div>
                    <h1>测井专业智能培训系统</h1>
                    <p>石油工程知识综合学习平台</p>
                </div>

                <!-- Error Alert -->
                <div id="errorAlert" class="alert alert-danger">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="errorMessage"></span>
                </div>

                <!-- Success Alert -->
                <div id="successAlert" class="alert alert-success">
                    <i class="bi bi-check-circle-fill"></i>
                    <span id="successMessage"></span>
                </div>

                <!-- Role Selection Tabs -->
                <div class="role-tabs" id="roleTabs">
                    <button class="role-tab active" data-role="admin" onclick="selectRole('admin')">
                        <i class="bi bi-shield-lock-fill"></i>管理员
                    </button>
                    <button class="role-tab" data-role="student" onclick="selectRole('student')">
                        <i class="bi bi-person-fill"></i>学员
                    </button>
                </div>

                <!-- Login / Register Tabs -->
                <div class="form-tabs">
                    <button class="form-tab active" id="tabLogin" onclick="switchFormMode('login')">登录</button>
                    <button class="form-tab" id="tabRegister" onclick="switchFormMode('register')">注册</button>
                </div>

                <!-- Login Form -->
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">中石化统一账号</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person-fill"></i>
                            <input
                                type="text"
                                id="username"
                                placeholder="请输入中石化统一账号"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill"></i>
                            <input
                                type="password"
                                id="password"
                                placeholder="请输入密码"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-check">
                        <input type="checkbox" id="rememberMe" />
                        <label for="rememberMe">记住我的登录状态</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
                        <span id="loginBtnText">
                            <i class="bi bi-box-arrow-in-right"></i>&nbsp;登录系统
                        </span>
                        <span id="loginLoading" class="loading"></span>
                    </button>
                </form>

                <!-- Register Form (hidden by default) -->
                <form id="registerForm" style="display:none">
                    <div class="form-group">
                        <label for="regUsername">中石化统一账号</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person-fill"></i>
                            <input
                                type="text"
                                id="regUsername"
                                placeholder="请输入中石化统一账号"
                                required
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regName">真实姓名</label>
                        <div class="input-wrapper">
                            <i class="bi bi-person-vcard-fill"></i>
                            <input
                                type="text"
                                id="regName"
                                placeholder="请输入真实姓名"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regPassword">设置密码</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill"></i>
                            <input
                                type="password"
                                id="regPassword"
                                placeholder="请设置密码（至少6位）"
                                required
                                minlength="6"
                            />
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="regConfirm">确认密码</label>
                        <div class="input-wrapper">
                            <i class="bi bi-lock-fill"></i>
                            <input
                                type="password"
                                id="regConfirm"
                                placeholder="请再次输入密码"
                                required
                            />
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
                        <span id="registerBtnText">
                            <i class="bi bi-person-plus-fill"></i>&nbsp;注册新账号
                        </span>
                        <span id="registerLoading" class="loading"></span>
                    </button>
                </form>

                <!-- Demo Accounts -->
                <div class="demo-accounts">
                    <div class="demo-accounts-label">
                        <i class="bi bi-info-circle"></i>&nbsp;演示账户（点击快速登录）
                    </div>

                    <div class="demo-account-row">
                        <span class="demo-role-name">
                            <i class="bi bi-shield-lock-fill"></i>&nbsp;管理员
                        </span>
                        <button class="demo-btn" onclick="quickLogin('admin', 'admin123')">
                            admin / admin123
                        </button>
                    </div>

                    <div class="demo-account-row">
                        <span class="demo-role-name">
                            <i class="bi bi-person-fill"></i>&nbsp;学员
                        </span>
                        <button class="demo-btn" onclick="quickLogin('student', 'student123')">
                            student / student123
                        </button>
                    </div>
                </div>

                <!-- 游客入口 -->
                <div class="guest-entry">
                    <button class="btn-guest" onclick="enterAsGuest()">
                        <i class="bi bi-eye"></i> 游客进入 — 免登录浏览
                    </button>
                    <div class="guest-hint">
                        无需账号，直接浏览知识库、案例等公开内容
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                &copy; 2026 测井专业智能培训系统 &mdash; 专业版 v2.0
            </div>
        </div>

        <script>
            // API配置
            const API_BASE = 'http://localhost:3000/api';

            // 表单模式切换（登录/注册）
            function switchFormMode(mode) {
                document.getElementById('loginForm').style.display = mode === 'login' ? '' : 'none';
                document.getElementById('registerForm').style.display = mode === 'register' ? '' : 'none';
                document.getElementById('tabLogin').classList.toggle('active', mode === 'login');
                document.getElementById('tabRegister').classList.toggle('active', mode === 'register');
                // 隐藏提示信息
                document.getElementById('errorAlert').style.display = 'none';
                document.getElementById('successAlert').style.display = 'none';
            }

            // 角色快速选择 - 填充凭证并快速登录
            function selectRole(role) {
                var accounts = {
                    admin: ['admin', 'admin123'],
                    student: ['student', 'student123'],
                };
                var credentials = accounts[role];
                if (!credentials) return;

                // 更新活跃标签
                document.querySelectorAll('.role-tab').forEach(function (tab) {
                    tab.classList.toggle('active', tab.dataset.role === role);
                });

                // 填充并快速登录
                quickLogin(credentials[0], credentials[1]);
            }

            // 登录函数
            async function performLogin(username, password) {
                try {
                    const response = await fetch(`${API_BASE}/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, password }),
                    });

                    const data = await response.json();

                    if (response.ok) {
                        // 清除游客模式，保存登录信息
                        localStorage.removeItem('guestMode');
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('currentUser', JSON.stringify(data.user));

                        if (document.getElementById('rememberMe').checked) {
                            localStorage.setItem('rememberLogin', 'true');
                        }

                        showSuccess('登录成功！正在跳转...');

                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1500);

                        return true;
                    } else {
                        showError(data.message || '用户名或密码错误');
                        return false;
                    }
                } catch (error) {
                    console.error('登录错误:', error);
                    showError('登录失败: 网络连接错误，请确保服务器正在运行');
                    return false;
                }
            }

            // 快速登录
            async function quickLogin(username, password) {
                document.getElementById('username').value = username;
                document.getElementById('password').value = password;

                // 显示加载状态
                setLoading(true);

                const success = await performLogin(username, password);
                setLoading(false);

                return success;
            }

            // 设置加载状态
            function setLoading(loading) {
                const btn = document.getElementById('loginBtn');
                const btnText = document.getElementById('loginBtnText');
                const loadingSpinner = document.getElementById('loginLoading');

                if (loading) {
                    btn.disabled = true;
                    btnText.style.display = 'none';
                    loadingSpinner.style.display = 'inline-block';
                } else {
                    btn.disabled = false;
                    btnText.style.display = 'inline';
                    loadingSpinner.style.display = 'none';
                }
            }

            // 显示错误信息
            function showError(message) {
                const errorAlert = document.getElementById('errorAlert');
                const errorMessage = document.getElementById('errorMessage');
                const successAlert = document.getElementById('successAlert');

                errorMessage.textContent = message;
                errorAlert.style.display = 'block';
                successAlert.style.display = 'none';

                // 3秒后自动隐藏
                setTimeout(() => {
                    errorAlert.style.display = 'none';
                }, 3000);
            }

            // 显示成功信息
            function showSuccess(message) {
                const successAlert = document.getElementById('successAlert');
                const successMessage = document.getElementById('successMessage');
                const errorAlert = document.getElementById('errorAlert');

                successMessage.textContent = message;
                successAlert.style.display = 'block';
                errorAlert.style.display = 'none';
            }

            // 表单提交处理
            document.getElementById('loginForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                if (!username || !password) {
                    showError('请输入用户名和密码');
                    return;
                }

                setLoading(true);
                await performLogin(username, password);
                setLoading(false);
            });

            // 检查是否已经登录
            window.addEventListener('load', function () {
                const authToken = localStorage.getItem('authToken');
                const currentUser = localStorage.getItem('currentUser');

                if (authToken && currentUser) {
                    // 清除游客模式，直接跳转
                    localStorage.removeItem('guestMode');
                    window.location.href = 'index.html';
                    return;
                }

                // 恢复记住的用户名
                const rememberedUsername = localStorage.getItem('rememberedUsername');
                if (rememberedUsername) {
                    document.getElementById('username').value = rememberedUsername;
                    document.getElementById('rememberMe').checked = true;
                }
            });

            // 游客进入
            function enterAsGuest() {
                localStorage.setItem('guestMode', 'true');
                window.location.href = '/';
            }

            // 记住用户名
            document.getElementById('rememberMe').addEventListener('change', function () {
                if (this.checked) {
                    const username = document.getElementById('username').value.trim();
                    if (username) {
                        localStorage.setItem('rememberedUsername', username);
                    }
                } else {
                    localStorage.removeItem('rememberedUsername');
                    localStorage.removeItem('rememberLogin');
                }
            });

            // 保存用户名输入
            document.getElementById('username').addEventListener('blur', function () {
                if (document.getElementById('rememberMe').checked) {
                    const username = this.value.trim();
                    if (username) {
                        localStorage.setItem('rememberedUsername', username);
                    }
                }
            });

            // 注册提交
            document.getElementById('registerForm').addEventListener('submit', async function (e) {
                e.preventDefault();

                const username = document.getElementById('regUsername').value.trim();
                const name = document.getElementById('regName').value.trim();
                const password = document.getElementById('regPassword').value;
                const confirm = document.getElementById('regConfirm').value;

                if (!username || !password || !confirm) {
                    showError('请填写完整信息');
                    return;
                }
                if (password.length < 6) {
                    showError('密码至少6位');
                    return;
                }
                if (password !== confirm) {
                    showError('两次输入的密码不一致');
                    return;
                }

                setRegisterLoading(true);

                try {
                    const res = await fetch(`${API_BASE}/auth/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            username,
                            password,
                            role: 'student',
                            profile: { name: name || '' },
                        }),
                    });

                    const data = await res.json();

                    if (res.ok) {
                        showSuccess('注册成功，正在跳转...');
                        localStorage.setItem('authToken', data.token);
                        localStorage.setItem('currentUser', JSON.stringify(data.user));
                        setTimeout(() => window.location.href = '/', 1500);
                    } else {
                        showError(data.message || '注册失败');
                    }
                } catch (err) {
                    showError('注册失败: 网络连接错误');
                } finally {
                    setRegisterLoading(false);
                }
            });

            function setRegisterLoading(loading) {
                const btn = document.getElementById('registerBtn');
                const btnText = document.getElementById('registerBtnText');
                const spinner = document.getElementById('registerLoading');
                btn.disabled = loading;
                btnText.style.display = loading ? 'none' : 'inline';
                spinner.style.display = loading ? 'inline-block' : 'none';
            }
        </script>
    </body>
</html>
